<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREDD Vakinankaratra - Entrepreneuriat Vert</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; overflow-x: hidden; }

        /* Conteneur de la vidéo de couverture */
        .hero { 
            position: relative; 
            height: 60vh; 
            width: 100%; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            background-color: #1a1a1a; /* Couleur de secours si la vidéo charge mal */
        }

        video#bg-video { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            min-width: 100%; 
            min-height: 100%; 
            width: auto; 
            height: auto; 
            z-index: 0; 
            transform: translate(-50%, -50%); 
            filter: brightness(0.5); 
            object-fit: cover;
        }

        .hero-content { z-index: 2; padding: 20px; animation: fadeInUp 1.2s ease-out; }

        .logo { width: 120px; margin-bottom: 10px; }

        h1 { font-size: 2rem; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { font-weight: bold; font-size: 1rem; margin-top: 5px; color: #4ade80; }

        /* Formulaire */
        .form-section { 
            background: white; 
            color: #333; 
            max-width: 450px; 
            margin: -40px auto 50px; 
            position: relative; 
            z-index: 10;
            border-radius: 15px; 
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        /* Bouton violet DREDD */
        .btn-submit { 
            width: 100%; 
            height: 45px; 
            background-color: #7c0e73; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            transition: 0.3s; 
        }
        .btn-submit:hover { background-color: #5a0a53; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
        
        <div class="hero-content">
            <img src="logo.png" alt="Logo DREDD" class="logo">
            <h1>Identification des acteurs</h1>
            <div class="subtitle">DREDD VAKINANKARATRA</div>
        </div>
    </div>

    <div class="form-section">
        <form id="actor-form">
            <label>Nom de l'organisation / Acteur</label>
            <input type="text" id="name" placeholder="Ex: Association Verte" required>

            <label>Domaine d'intervention</label>
            <input type="text" id="sector" placeholder="Ex: Reforestation, Pépinière..." required>

            <label>Observations techniques</label>
            <textarea id="obs" rows="4" placeholder="Détails sur l'activité..."></textarea>

            <button type="submit" class="btn-submit" id="submit-btn">Soumettre à la DREDD</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('actor-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // --- REMPLIR ICI ---
            const TOKEN = "VOTRE_TOKEN_ICI"; 
            const REPO = "mywebsite-art/entrepreneuriat_vert"; 
            // ------------------

            btn.innerText = "Envoi en cours...";
            btn.disabled = true;

            const name = document.getElementById('name').value;
            const sector = document.getElementById('sector').value;
            const obs = document.getElementById('obs').value;

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/issues`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        title: `Nouvel Acteur : ${name}`,
                        body: `**Secteur:** ${sector}\n\n**Observations:**\n${obs}`,
                        labels: ['acteur-vert']
                    })
                });

                if (response.ok) {
                    alert("Succès ! Les données ont été envoyées à GitHub.");
                    form.reset();
                } else {
                    alert("Erreur. Vérifiez votre Token dans le code.");
                }
            } catch (err) {
                alert("Erreur de connexion.");
            } finally {
                btn.innerText = "Soumettre à la DREDD";
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
