<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREDD Vakinankaratra - Entrepreneuriat Vert</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; overflow-x: hidden; }

        /* Conteneur de la vidéo de couverture */
        .hero { position: relative; height: 60vh; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; text-align: center; }

        video#bg-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; z-index: -1; transform: translate(-50%, -50%); filter: brightness(0.6); }

        .hero-content { z-index: 1; padding: 20px; animation: fadeInUp 1.5s ease-out; }

        .logo { width: 120px; margin-bottom: 10px; }

        h1 { font-size: 2.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { font-weight: bold; font-size: 1.2rem; margin-top: 5px; color: #4ade80; }

        /* Formulaire */
        .form-section { background: white; color: #333; max-width: 500px; margin: -50px auto 50px; position: relative; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        /* Votre bouton violet personnalisé */
        .btn-submit { width: 100%; height: 45px; background-color: #7c0e73; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background-color: #5a0a53; transform: translateY(-2px); }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <video autoplay muted loop id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <img src="logo.png" alt="Logo DREDD" class="logo">
            <h1>Identification des acteurs</h1>
            <div class="subtitle">DREDD VAKINANKARATRA</div>
        </div>
    </div>

    <div class="form-section">
        <form>
            <label>Nom de l'organisation / Acteur</label>
            <input type="text" placeholder="Ex: Association Verte">

            <label>Domaine d'intervention</label>
            <input type="text" placeholder="Ex: Reforestation, Pépinière...">

            <label>Observations techniques</label>
            <textarea rows="4" placeholder="Détails sur l'activité..."></textarea>

            <button type="submit" class="btn-submit">Soumettre à GitHub</button>
        </form>
    </div>

</body>
</html>
